name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Each OS builds natively on its own runner (cross-compiling vendored LuaJIT
# + native capture/GTK is unreliable), then the per-platform packaging script
# stages the binary + examples + docs into an archive, which is attached to a
# single GitHub Release for the tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: pwsh -File scripts/package.ps1
          - os: macos-latest
            script: bash scripts/package.sh
          - os: ubuntu-latest
            script: bash scripts/package.sh

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Linux: rfd needs GTK3; nokhwa's V4L2 capture needs libv4l + udev.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libv4l-dev libudev-dev

      - name: Build and package
        run: ${{ matrix.script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sni-lua-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
